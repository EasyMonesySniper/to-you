<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To Thúy Hiền 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music-control" onclick="toggleMusic()">🎵</div>

<div class="container" id="content">
</div>

<script>
const audio = document.getElementById("bgMusic");

// ====== MUSIC ======
function toggleMusic() {
    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}

// ====== PAGE CONTENT ======
function loadPage(page) {
    const content = document.getElementById("content");

    if (page === "home") {
        content.innerHTML = `
            <h1>Hi, my love 😘</h1>
            <p class="subtitle">
                Welcome to the tiny little world i made just for you. This supposed to be given to you on your birthday. But you know, something unexpected happened, so i think i should give you this asap. Lots of things are still incomplete, so i hope you will enjoy it.
            </p>

            <div class="card">
                <p>
                    If love were a game, you’d be the final boss 💕  
                    And yes, I’d happily lose every time.
                </p>
            </div>

            <div class="nav">
                <a href="#" onclick="loadPage('memories')">📸 Our Memories</a>
                <a href="#" onclick="loadPage('reasons')">💌 Why I Love You</a>
            </div>
        `;
    }

    if (page === "memories") {
        content.innerHTML = `
            <h1>Our Memories 📸</h1>

            <div class="card">
                <p>✨ The first time I met you, i realized you were the special one for me</p>
                <p>✨ Those talks we couldn’t stop throughout days and nights</p>
                <p>✨ The moments that will forever live in my heart</p>
            </div>

            <div class="nav">
                <a href="#" onclick="loadPage('home')">⬅ Home</a>
                <a href="#" onclick="loadPage('reasons')">➡ Reasons</a>
            </div>
        `;
    }

    if (page === "reasons") {
        content.innerHTML = `
            <h1>Why I Love You ❤️</h1>

            <div class="card playful">
                <ul>
                    <li>😄 Your smile = instant happiness</li>
                    <li>💬 Talking to you never gets boring</li>
                    <li>💖 You make simple days special</li>
                    <li>🥰 You are you (best reason)</li>
                </ul>
            </div>

            <p class="ending">
                My dear, you’re my favorite person. I love you and gonna miss you so muchhhhhhhhhhhhhhhh 💕
            </p>

            <div class="nav">
                <a href="#" onclick="loadPage('memories')">⬅ Memories</a>
                <a href="#" onclick="loadPage('home')">🏠 Home</a>
            </div>
        `;
    }
}

// Load trang đầu tiên
loadPage("home");
</script>

</body>
</html>
